<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Notas - Unidades Didácticas</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
            --text-light: #4b5563;
            --border: #e5e7eb;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success: #10b981;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .grid {
                grid-template-columns: 1fr 2fr;
            }
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border);
        }

        .card h2 {
            margin-top: 0;
            font-size: 1.25rem;
            border-bottom: 2px solid var(--bg);
            padding-bottom: 10px;
            color: var(--primary);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--text-light);
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-box input {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            background-color: var(--bg);
            font-weight: 600;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .badge-success {
            background-color: #d1fae5;
            color: #065f46;
        }

        .badge-danger {
            background-color: #fee2e2;
            color: #991b1b;
        }

        .btn-delete {
            background-color: var(--danger);
            padding: 6px 12px;
            font-size: 0.85rem;
            width: auto;
        }

        .btn-delete:hover {
            background-color: var(--danger-hover);
        }

        .empty-state {
            text-align: center;
            color: var(--text-light);
            padding: 30px;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>=== SISTEMA DE NOTAS ===</h1>

    <div class="grid">
        <!-- REGISTRAR UNIDAD DIDÁCTICA -->
        <div class="card">
            <h2>1. Registrar Unidad</h2>
            <form id="notaForm">
                <div class="form-group">
                    <label for="nombre">Nombre de la Unidad:</label>
                    <input type="text" id="nombre" placeholder="Ej. Programación Web" required>
                </div>
                <div class="form-group">
                    <label for="nota1">Nota 1:</label>
                    <input type="number" id="nota1" min="0" max="20" step="0.1" placeholder="0 - 20" required>
                </div>
                <div class="form-group">
                    <label for="nota2">Nota 2:</label>
                    <input type="number" id="nota2" min="0" max="20" step="0.1" placeholder="0 - 20" required>
                </div>
                <div class="form-group">
                    <label for="nota3">Nota 3:</label>
                    <input type="number" id="nota3" min="0" max="20" step="0.1" placeholder="0 - 20" required>
                </div>
                <button type="submit">Registrar Datos</button>
            </form>
        </div>

        <!-- MOSTRAR, BUSCAR Y ELIMINAR -->
        <div class="card">
            <h2>Unidades Registradas</h2>
            
            <div class="search-box">
                <input type="text" id="buscar" placeholder="Buscar unidad didáctica...">
            </div>

            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Unidad Didáctica</th>
                            <th>Nota 1</th>
                            <th>Nota 2</th>
                            <th>Nota 3</th>
                            <th>Promedio</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="listaUnidades">
                        <!-- Las filas se generarán dinámicamente aquí -->
                    </tbody>
                </table>
            </div>
            <div id="vacio" class="empty-state">No hay unidades didácticas registradas.</div>
        </div>
    </div>
</div>

<script>
    // Tu lista vacía de Python ahora es un array de objetos en JavaScript
    let lista = [];

    const form = document.getElementById('notaForm');
    const listaTabla = document.getElementById('listaUnidades');
    const emptyState = document.getElementById('vacio');
    const inputBuscar = document.getElementById('buscar');

    // Clase Estudiante (equivalente a tu class estudiante de Python)
    class Estudiante {
        constructor(nombre, nota1, nota2, nota3) {
            this.nombre = nombre;
            this.nota1 = parseFloat(nota1);
            this.nota2 = parseFloat(nota2);
            this.nota3 = parseFloat(nota3);
        }

        getPromedio() {
            return ((this.nota1 + this.nota2 + this.nota3) / 3).toFixed(2);
        }
    }

    // 1. REGISTRAR UNIDAD DIDÁCTICA
    form.addEventListener('submit', (e) => {
        e.preventDefault();

        const nombre = document.getElementById('nombre').value;
        const n1 = document.getElementById('nota1').value;
        const n2 = document.getElementById('nota2').value;
        const n3 = document.getElementById('nota3').value;

        // Instanciamos el objeto de la clase Estudiante
        const nuevoEstudiante = new Estudiante(nombre, n1, n2, n3);
        
        // Lo agregamos a la lista
        lista.push(nuevoEstudiante);

        alert("Datos registrados correctamente");
        form.reset();
        document.getElementById('nombre').focus();
        
        actualizarTabla();
    });

    // 2 y 3. MOSTRAR UNIDAD DIDÁCTICA Y PROMEDIOS
    function actualizarTabla(filtro = "") {
        listaTabla.innerHTML = "";
        
        // Filtramos la lista según el buscador (Buscador integrado de tu Opción 4)
        const listaFiltrada = lista.filter(item => 
            item.nombre.toLowerCase().includes(filtro.toLowerCase())
        );

        if (listaFiltrada.length === 0) {
            emptyState.style.display = "block";
        } else {
            emptyState.style.display = "none";
            
            listaFiltrada.forEach((item, index) => {
                const prom = item.getPromedio();
                // Si la nota aprobatoria en tu institución es diferente, puedes cambiar el 10.5 o 13 aquí
                const badgeClass = prom >= 12.5 ? 'badge-success' : 'badge-danger'; 

                const fila = document.createElement('tr');
                fila.innerHTML = `
                    <strong><td>${item.nombre}</td></strong>
                    <td>${item.nota1}</td>
                    <td>${item.nota2}</td>
                    <td>${item.nota3}</td>
                    <td><span class="badge ${badgeClass}">${prom}</span></td>
                    <td>
                        <button class="btn-delete" onclick="eliminarUnidad('${item.nombre}')">Eliminar</button>
                    </td>
                `;
                listaTabla.appendChild(fila);
            });
        }
    }

    // 4. BUSCADOR (Evento en tiempo real al escribir)
    inputBuscar.addEventListener('input', (e) => {
        actualizarTabla(e.target.value);
    });

    // 5. ELIMINAR (Con cuadro de confirmación como tu y/n de Python)
    window.eliminarUnidad = function(nombreEliminar) {
        const confirmar = confirm(`¿Deseas eliminar la unidad didáctica "${nombreEliminar}"?`);
        if (confirmar) {
            lista = lista.filter(item => item.nombre !== nombreEliminar);
            actualizarTabla(inputBuscar.value);
            alert("Unidad didáctica eliminada correctamente");
        }
    }
</script>

</body>
</html>
